name: Auto Sync Upstream

on:
  schedule:
    # 每天凌晨 2:00 (UTC) 执行一次同步
    - cron: '0 2 * * *'
  workflow_dispatch: # 允许在 GitHub 网页上手动点击运行

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Set up Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/kellyvv/PhoneClaw.git
          git fetch upstream
          
      - name: Merge and Push
        run: |
          git checkout main
          git merge upstream/main --ff-only || git merge upstream/main --no-edit
          git push origin main
